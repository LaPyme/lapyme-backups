name: Database Backup

on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: database-backup
  cancel-in-progress: false

env:
  BACKUP_PREFIX: db/4h
  RETAIN_COUNT: "42"

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate backup configuration
        env:
          BACKUP_DATABASE_URL: ${{ secrets.BACKUP_DATABASE_URL }}
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          set -euo pipefail

          for var in \
            BACKUP_DATABASE_URL \
            AWS_ACCESS_KEY_ID \
            AWS_SECRET_ACCESS_KEY \
            R2_ENDPOINT \
            R2_BUCKET
          do
            if [ -z "${!var:-}" ]; then
              echo "::error::Missing required secret: $var"
              exit 1
            fi
          done

      - name: Create and validate logical backup
        env:
          BACKUP_DATABASE_URL: ${{ secrets.BACKUP_DATABASE_URL }}
        run: |
          set -euo pipefail

          TIMESTAMP="$(date -u +%Y%m%dT%H%M%SZ)"
          BACKUP_FILE="backup_${TIMESTAMP}.dump"
          CHECKSUM_FILE="${BACKUP_FILE}.sha256"

          docker run --rm \
            -e BACKUP_DATABASE_URL \
            -e BACKUP_FILE="$BACKUP_FILE" \
            -v "$PWD:/workspace" \
            -w /workspace \
            postgres:17 \
            sh -ceu '
              pg_dump \
                --dbname "$BACKUP_DATABASE_URL" \
                --format=custom \
                --compress=9 \
                --exclude-table-data=public.iibb_padron_rates \
                --file "$BACKUP_FILE"

              # Fail here if the custom dump is unreadable or empty/corrupt.
              pg_restore --list "$BACKUP_FILE" >/dev/null
            '

          sha256sum "$BACKUP_FILE" > "$CHECKSUM_FILE"

          echo "BACKUP_FILE=$BACKUP_FILE" >> "$GITHUB_ENV"
          echo "CHECKSUM_FILE=$CHECKSUM_FILE" >> "$GITHUB_ENV"

      - name: Upload backup artifacts to R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          set -euo pipefail

          aws s3 cp \
            "$BACKUP_FILE" \
            "s3://${R2_BUCKET}/${BACKUP_PREFIX}/${BACKUP_FILE}" \
            --endpoint-url "$R2_ENDPOINT" \
            --only-show-errors

          aws s3 cp \
            "$CHECKSUM_FILE" \
            "s3://${R2_BUCKET}/${BACKUP_PREFIX}/${CHECKSUM_FILE}" \
            --endpoint-url "$R2_ENDPOINT" \
            --only-show-errors

      - name: Retain only the newest backups
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          set -euo pipefail

          mapfile -t DUMP_KEYS < <(
            aws s3 ls "s3://${R2_BUCKET}/${BACKUP_PREFIX}/" \
              --endpoint-url "$R2_ENDPOINT" |
              awk '{print $4}' |
              grep -E '\.dump$' |
              sort
          )

          TOTAL_BACKUPS="${#DUMP_KEYS[@]}"

          if [ "$TOTAL_BACKUPS" -le "$RETAIN_COUNT" ]; then
            echo "No retention cleanup needed. Found ${TOTAL_BACKUPS} dump files."
            exit 0
          fi

          DELETE_COUNT=$((TOTAL_BACKUPS - RETAIN_COUNT))

          for ((i = 0; i < DELETE_COUNT; i++)); do
            KEY="${DUMP_KEYS[$i]}"
            aws s3 rm \
              "s3://${R2_BUCKET}/${BACKUP_PREFIX}/${KEY}" \
              --endpoint-url "$R2_ENDPOINT" \
              --only-show-errors

            aws s3 rm \
              "s3://${R2_BUCKET}/${BACKUP_PREFIX}/${KEY}.sha256" \
              --endpoint-url "$R2_ENDPOINT" \
              --only-show-errors || true
          done
